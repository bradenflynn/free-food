<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFF Discovery | University of San Diego</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=Space+Grotesk:wght@300;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --galaxy-bg: #020205;
            --accent-pink: #e52e71;
            --accent-orange: #ff8a00;
            --accent-blue: #4f46e5;
            --accent-cyan: #0ea5e9;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--galaxy-bg);
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        h1,
        h2,
        h3,
        .font-space {
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Galaxy Background Animation */
        .galaxy-wrap {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #0a0a1a 0%, #020205 100%);
        }

        #star-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .planet {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.4;
            filter: blur(2px);
        }

        .planet-1 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle at 30% 30%, #4f46e5, #000);
            top: -50px;
            right: -50px;
            box-shadow: 0 0 60px rgba(79, 70, 229, 0.3);
            animation: float-slow 20s infinite ease-in-out;
        }

        .planet-2 {
            width: 150px;
            height: 150px;
            background: radial-gradient(circle at 30% 30%, #e52e71, #000);
            bottom: 10%;
            left: -30px;
            box-shadow: 0 0 40px rgba(229, 46, 113, 0.2);
            animation: float-slow 15s infinite ease-in-out reverse;
        }

        @keyframes float-slow {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-30px) rotate(5deg);
            }
        }

        .comet {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px 2px #fff, 0 0 20px 4px rgba(255, 255, 255, 0.5);
            opacity: 0;
            pointer-events: none;
        }

        .comet::after {
            content: '';
            position: absolute;
            top: 50%;
            right: 0;
            width: 100px;
            height: 1px;
            background: linear-gradient(to left, rgba(255, 255, 255, 0.8), transparent);
            transform: translateY(-50%);
        }

        @keyframes comet-move {
            0% {
                transform: translate(100vw, -100vh) rotate(-45deg);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translate(-100px, 100vh) rotate(-45deg);
                opacity: 0;
            }
        }

        .blob {
            position: absolute;
            width: 600px;
            height: 600px;
            background: linear-gradient(45deg, var(--accent-pink), var(--accent-orange));
            filter: blur(140px);
            border-radius: 50%;
            opacity: 0.12;
            animation: move-blobs 30s infinite alternate;
        }

        .blob-2 {
            background: linear-gradient(45deg, var(--accent-blue), var(--accent-cyan));
            animation-delay: -15s;
            animation-duration: 35s;
            right: -100px;
            top: -100px;
        }

        @keyframes move-blobs {
            from {
                transform: translate(-15%, -15%) scale(1);
            }

            to {
                transform: translate(25%, 25%) scale(1.3);
            }
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .gradient-text {
            background: linear-gradient(45deg, #ff8a00, #e52e71);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 3D Tilt Wrapper */
        .tilt-card {
            transform-style: preserve-3d;
            perspective: 1000px;
            transition: transform 0.1s ease-out;
        }

        .card-inner {
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .section-header {
            position: relative;
            padding-bottom: 0.5rem;
            margin-bottom: 2.5rem;
        }

        .section-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, #e52e71, transparent);
            border-radius: 2px;
        }

        /* Skeleton Shimmer */
        .skeleton {
            background: rgba(255, 255, 255, 0.05);
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.05) 25%, rgba(255, 255, 255, 0.1) 50%, rgba(255, 255, 255, 0.05) 75%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* Entry Animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-card {
            animation: fadeInUp 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            opacity: 0;
        }

        /* Blur-up Image */
        .blur-up {
            filter: blur(20px);
            transition: filter 1s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .blur-up.loaded {
            filter: blur(0);
        }

        /* Magnetic Button Glow */
        .magnetic-wrap {
            display: inline-block;
            transition: transform 0.2s cubic-bezier(0.23, 1, 0.32, 1);
        }
    </style>
</head>

<body class="p-8 pb-32">
    <div class="galaxy-wrap">
        <canvas id="star-canvas"></canvas>
        <div class="planet planet-1"></div>
        <div class="planet planet-2"></div>
        <div class="blob"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="max-w-7xl mx-auto relative z-10">
        <header class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-20 gap-8">
            <div>
                <h1 class="text-6xl md:text-7xl font-black gradient-text tracking-tighter mb-2">Free Food Hunter</h1>
                <p class="text-gray-400 text-xl font-light">University of San Diego | Discovery Dashboard</p>
            </div>
            <div class="flex flex-wrap gap-4">
                <!-- Sync All Button -->
                <button onclick="exportToCalendar()"
                    class="glass px-8 py-4 rounded-[2.5rem] flex items-center gap-4 hover:bg-white/10 transition-all active:scale-95 group shadow-2xl">
                    <span class="text-2xl group-hover:rotate-12 transition-transform">🗓️</span>
                    <div class="flex flex-col items-start">
                        <span class="font-black text-xs uppercase tracking-widest text-white">Sync All</span>
                        <span class="text-[10px] text-gray-400 font-bold">To "Free Food" Calendar</span>
                    </div>
                </button>

                <div class="glass px-8 py-4 rounded-[2.5rem] flex items-center gap-4">
                    <span class="w-4 h-4 bg-pink-500 rounded-full animate-ping"></span>
                    <div class="flex flex-col">
                        <span id="pending-count" class="font-black text-2xl leading-none">0</span>
                        <span class="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Total Finds</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Section 1: Confirmed Free Food -->
        <section class="mb-24">
            <div class="section-header">
                <h2 class="text-4xl font-black text-white italic tracking-tight">Confirmed Food 🍕</h2>
            </div>
            <div id="confirmed-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
                <!-- Skeletons loader -->
                <div class="glass rounded-[3rem] h-[600px] skeleton"></div>
                <div class="glass rounded-[3rem] h-[600px] skeleton"></div>
                <div class="glass rounded-[3rem] h-[600px] skeleton"></div>
            </div>
            <div id="confirmed-empty" class="hidden py-16 text-center glass rounded-[3rem] mt-8">
                <p class="text-gray-500 text-xl italic font-light">The hunt continues... No confirmed food yet.</p>
            </div>
        </section>

        <!-- Section 2: General Events -->
        <section>
            <div class="section-header">
                <h2 class="text-4xl font-black text-white italic tracking-tight">General Events 📅</h2>
            </div>
            <div id="general-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
            </div>
            <div id="general-empty" class="hidden py-16 text-center glass rounded-[3rem] mt-8">
                <p class="text-gray-500 text-xl italic font-light">All quiet on the discovery front.</p>
            </div>
        </section>
    </div>

    <script>
        const API_BASE = 'http://localhost:5001';
        let allFutureEvents = [];

        async function fetchEvents() {
            try {
                let response;
                try {
                    response = await fetch(`${API_BASE}/api/events`);
                    if (!response.ok) throw new Error();
                } catch {
                    response = await fetch(`data.json?v=${Date.now()}`);
                }
                const events = await response.json();

                // Allow a small delay for premium feel
                setTimeout(() => {
                    renderEvents(events);
                }, 500);
            } catch (err) {
                console.error("Failed to fetch events:", err);
            }
        }

        function formatDate(dateStr) {
            if (!dateStr || !dateStr.includes('-')) return dateStr;
            const months = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
            const date = new Date(dateStr + 'T00:00:00');
            if (isNaN(date.getTime())) return dateStr;
            return `${months[date.getMonth()]} ${date.getDate()}`;
        }

        // --- Improved Calendar Time Parsing ---
        function parseToIcsDateTime(dateStr, timeStr, type = 'start') {
            const today = new Date();
            const year = dateStr ? dateStr.split('-')[0] : today.getFullYear();
            const cleanDate = dateStr ? dateStr.replace(/-/g, '') : today.toISOString().split('T')[0].replace(/-/g, '');

            if (!timeStr || timeStr.toLowerCase().includes('tbd')) {
                // If it's just a date, return YYYYMMDD (all day)
                return { value: cleanDate, isAllDay: true };
            }

            // Extract times like "1-2 PM", "1:30 PM", "12 PM"
            const timeMatch = timeStr.match(/(\d+)(?::(\d+))?\s*(AM|PM)?(?:\s*-\s*(\d+)(?::(\d+))?\s*(AM|PM)?)?/i);
            if (!timeMatch) return { value: cleanDate, isAllDay: true };

            let hours1 = parseInt(timeMatch[1]);
            let mins1 = parseInt(timeMatch[2] || "0");
            let ampm1 = (timeMatch[3] || "").toUpperCase();

            let hours2 = parseInt(timeMatch[4]);
            let mins2 = parseInt(timeMatch[5] || "0");
            let ampm2 = (timeMatch[6] || "").toUpperCase();

            // Handle AM/PM logic
            if (!ampm1 && ampm2) ampm1 = ampm2; // "1-2 PM" case
            if (ampm1 === 'PM' && hours1 < 12) hours1 += 12;
            if (ampm1 === 'AM' && hours1 === 12) hours1 = 0;

            if (hours2) {
                if (ampm2 === 'PM' && hours2 < 12) hours2 += 12;
                if (ampm2 === 'AM' && hours2 === 12) hours2 = 0;
            } else {
                // Default duration 1 hour if no end time
                hours2 = hours1 + 1;
                mins2 = mins1;
            }

            const targetHours = type === 'start' ? hours1 : hours2;
            const targetMins = type === 'start' ? mins1 : mins2;

            const h = targetHours.toString().padStart(2, '0');
            const m = targetMins.toString().padStart(2, '0');
            return { value: `${cleanDate}T${h}${m}00`, isAllDay: false };
        }
        // --------------------------------------

        // 3D Tilt Logic
        function handleTilt(e, card) {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const centerX = rect.width / 2;
            const centerY = rect.height / 2;

            const tiltX = (y - centerY) / 20;
            const tiltY = (centerX - x) / 20;

            card.style.transform = `rotateX(${tiltX}deg) rotateY(${tiltY}deg) scale(1.02)`;
        }

        function resetTilt(card) {
            card.style.transform = `rotateX(0deg) rotateY(0deg) scale(1)`;
        }

        // Magnetic Logic
        function handleMagnetic(e, btn) {
            const rect = btn.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;

            btn.style.transform = `translate(${x * 0.3}px, ${y * 0.3}px)`;
        }

        function resetMagnetic(btn) {
            btn.style.transform = `translate(0, 0)`;
        }

        // Count-up Animation
        function animateValue(id, start, end, duration) {
            const obj = document.getElementById(id);
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start);
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        function createCard(event, index) {
            const isConfirmed = event.has_free_food;
            const imgUrl = event.image_path;
            const delay = index * 0.1;

            return `
                <div class="tilt-card animate-card" style="animation-delay: ${delay}s" 
                     onmousemove="handleTilt(event, this)" onmouseleave="resetTilt(this)">
                    <div class="glass rounded-[3rem] overflow-hidden card-inner flex flex-col h-full shadow-2xl">
                        <div class="relative h-80 overflow-hidden group bg-neutral-950">
                            <!-- Blur-up Image Implementation -->
                            <img src="${imgUrl}" 
                                 onload="this.classList.add('loaded')"
                                 onerror="this.src='${API_BASE}/${imgUrl}'; this.onerror=null;" 
                                 class="w-full h-full object-contain transition-transform duration-1000 group-hover:scale-110 blur-up">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/10 to-black/10"></div>
                            
                            <div class="absolute bottom-6 left-8">
                                <span class="bg-white/10 backdrop-blur-xl text-[10px] uppercase tracking-[0.3em] font-black px-4 py-2 rounded-full border border-white/10 shadow-2xl">
                                    @${event.source_handle}
                                </span>
                            </div>
                        </div>
                        
                        <div class="p-10 flex flex-col flex-grow">
                            <div class="mb-8">
                                <h3 class="text-3xl font-black text-white tracking-tight leading-none mb-4">${event.club_name || 'Organization'}</h3>
                                <p class="text-pink-500 font-bold text-lg uppercase tracking-tight">
                                    ${event.food_provided || (isConfirmed ? 'Free Food Detected' : 'General Event')}
                                </p>
                            </div>
                            
                            <div class="space-y-5 text-gray-400 mb-10 mt-auto">
                                <div class="flex items-center gap-4">
                                    <span class="text-2xl">📍</span> 
                                    <span class="font-medium text-white/80">${event.location || 'Location TBD'}</span>
                                </div>
                                <div class="flex items-center gap-4">
                                    <span class="text-2xl">🕒</span> 
                                    <div>
                                        <span class="font-black text-white text-xl">${formatDate(event.date)}</span>
                                        <span class="opacity-50 font-bold ml-1">• ${event.time || 'TBD'}</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-4">
                                <div class="magnetic-wrap" onmousemove="handleMagnetic(event, this)" onmouseleave="resetMagnetic(this)">
                                    <a href="https://www.instagram.com/p/${event.post_id}/" target="_blank" 
                                       class="glass w-full block text-white font-black py-5 rounded-3xl hover:bg-white/10 transition-colors text-center text-xs uppercase tracking-widest flex items-center justify-center gap-2">
                                        Instagram
                                    </a>
                                </div>
                                <div class="magnetic-wrap" onmousemove="handleMagnetic(event, this)" onmouseleave="resetMagnetic(this)">
                                    <button onclick="handleDismiss(${event.id})" 
                                            class="bg-white w-full text-black font-black py-5 rounded-3xl hover:bg-neutral-200 transition-colors active:scale-95 text-xs uppercase tracking-widest shadow-xl">
                                        Dismiss
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        async function exportToCalendar() {
            if (allFutureEvents.length === 0) {
                alert("No future events to sync!");
                return;
            }

            let icsContent = "BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//FreeFoodFinder//USD//EN\r\nX-WR-CALNAME:Free Food\r\n";

            allFutureEvents.forEach(event => {
                const start = parseToIcsDateTime(event.date, event.time, 'start');
                const end = parseToIcsDateTime(event.date, event.time, 'end');
                const uid = `fff-${event.post_id}@bradenflynn.github.io`;

                icsContent += "BEGIN:VEVENT\r\n";
                icsContent += `UID:${uid}\r\n`;
                icsContent += `DTSTAMP:${new Date().toISOString().replace(/[-:]/g, '').split('.')[0]}Z\r\n`;

                if (start.isAllDay) {
                    icsContent += `DTSTART;VALUE=DATE:${start.value}\r\n`;
                } else {
                    icsContent += `DTSTART:${start.value}\r\n`;
                    icsContent += `DTEND:${end.value}\r\n`;
                }

                icsContent += `SUMMARY:🍕 ${event.club_name}: ${event.food_provided || 'Free Food'}\r\n`;
                icsContent += `LOCATION:${event.location || 'USD Campus'}\r\n`;
                icsContent += `DESCRIPTION:View Original Post: https://instagram.com/p/${event.post_id}/\\n\\nTime tracked: ${event.time || 'Check post for details'}\r\n`;
                icsContent += "END:VEVENT\r\n";
            });

            icsContent += "END:VCALENDAR";

            const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.setAttribute('download', 'USD_Free_Food.ics');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            alert("✓ USD_Free_Food.ics generated! Open this file to add all events to your 'Free Food' subcalendar.");
        }

        async function handleDismiss(id) {
            if (confirm("Dismiss this event? It will be removed from your dashboard.")) {
                await updateStatus(id, 'reject');
            }
        }

        function renderEvents(events) {
            const confirmedGrid = document.getElementById('confirmed-grid');
            const generalGrid = document.getElementById('general-grid');
            const totalCount = document.getElementById('pending-count');
            const confirmedEmpty = document.getElementById('confirmed-empty');
            const generalEmpty = document.getElementById('general-empty');

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            allFutureEvents = events.filter(e => {
                if (!e.date) return true;
                const eventDate = new Date(e.date + 'T00:00:00');
                if (isNaN(eventDate.getTime())) return true;
                return eventDate >= today;
            });

            allFutureEvents.sort((a, b) => {
                if (!a.date) return 1;
                if (!b.date) return -1;
                return a.date.localeCompare(b.date);
            });

            // Start count-up animation
            animateValue('pending-count', 0, allFutureEvents.length, 1000);

            const confirmed = allFutureEvents.filter(e => e.has_free_food);
            const general = allFutureEvents.filter(e => !e.has_free_food);

            confirmedGrid.innerHTML = confirmed.map((e, i) => createCard(e, i)).join('');
            generalGrid.innerHTML = general.map((e, i) => createCard(e, i + confirmed.length)).join('');

            confirmed.length === 0 ? confirmedEmpty.classList.remove('hidden') : confirmedEmpty.classList.add('hidden');
            general.length === 0 ? generalEmpty.classList.remove('hidden') : generalEmpty.classList.add('hidden');
        }

        async function updateStatus(id, action) {
            await fetch(`${API_BASE}/api/events/${id}/${action}`, { method: 'POST' });
            fetchEvents();
        }

        // --- Starfield & Comet Logic ---
        function initBackground() {
            const canvas = document.getElementById('star-canvas');
            const ctx = canvas.getContext('2d');
            let stars = [];
            const starCount = 400;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                stars = [];
                for (let i = 0; i < starCount; i++) {
                    stars.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        size: Math.random() * 1.5,
                        speed: Math.random() * 0.05 + 0.02,
                        opacity: Math.random()
                    });
                }
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                stars.forEach(s => {
                    s.y -= s.speed;
                    if (s.y < 0) s.y = canvas.height;
                    ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                    ctx.fill();
                });
                requestAnimationFrame(animate);
            }

            window.addEventListener('resize', resize);
            resize();
            animate();

            // Comet spawning
            setInterval(() => {
                const comet = document.createElement('div');
                comet.className = 'comet';
                // Random position
                comet.style.top = Math.random() * 50 + '%';
                comet.style.right = '-100px';
                comet.style.animation = `comet-move ${Math.random() * 2 + 1}s linear forwards`;
                document.querySelector('.galaxy-wrap').appendChild(comet);
                setTimeout(() => comet.remove(), 3000);
            }, 8000);
        }

        initBackground();
        fetchEvents();
    </script>
</body>

</html>
